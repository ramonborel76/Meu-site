<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLife Pro - Seu Parceiro de Emagrecimento</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00b894;
            --secondary: #00cec9;
            --accent: #fdcb6e;
            --danger: #e17055;
            --dark: #2d3436;
            --light: #dfe6e9;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .mascot {
            font-size: 4rem;
            animation: bounce 2s infinite;
            cursor: pointer;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .speech-bubble {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            color: var(--dark);
            padding: 15px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            max-width: 200px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none;
            animation: popIn 0.3s;
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            right: 20px;
            border: 10px solid transparent;
            border-top-color: white;
        }

        h1 {
            font-size: 2rem;
            margin-top: 10px;
            font-weight: 800;
        }

        .date-display {
            opacity: 0.9;
            margin-top: 5px;
        }

        .nav-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            overflow-x: auto;
        }

        .nav-tab {
            flex: 1;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            color: #666;
            border: none;
            background: none;
            font-size: 0.85rem;
            min-width: 80px;
        }

        .nav-tab:hover {
            background: #e9ecef;
            color: var(--primary);
        }

        .nav-tab.active {
            background: white;
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        .nav-tab .icon {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .content {
            padding: 30px;
            min-height: 500px;
        }

        .section {
            display: none;
            animation: fadeIn 0.4s;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            border: 2px solid #f0f0f0;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-title {
            font-size: 1.3rem;
            color: var(--dark);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .progress-ring {
            width: 100px;
            height: 100px;
            margin: 10px auto;
            position: relative;
        }

        .progress-ring svg {
            transform: rotate(-90deg);
        }

        .progress-ring-bg {
            fill: none;
            stroke: rgba(255,255,255,0.3);
            stroke-width: 8;
        }

        .progress-ring-fill {
            fill: none;
            stroke: white;
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0,184,148,0.1);
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,184,148,0.4);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-accent {
            background: var(--accent);
            color: var(--dark);
        }

        .btn-block {
            width: 100%;
            display: block;
        }

        .meal-section {
            margin-bottom: 30px;
        }

        .meal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .meal-title {
            font-weight: 700;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .meal-calories {
            background: var(--primary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .food-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .food-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            transition: all 0.3s;
        }

        .food-item:hover {
            border-color: var(--primary);
        }

        .food-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .food-emoji {
            font-size: 2rem;
        }

        .food-name {
            font-weight: 600;
            color: var(--dark);
            font-size: 0.95rem;
        }

        .food-cals {
            color: #666;
            font-size: 0.85rem;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px;
        }

        .photo-analyzer {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 3px dashed var(--primary);
            margin-bottom: 30px;
        }

        .upload-area {
            padding: 40px 20px;
            border: 3px dashed var(--primary);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .upload-area:hover {
            background: #f0fff4;
            transform: scale(1.02);
        }

        .camera-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .analyzer-result {
            display: none;
            margin-top: 20px;
            animation: slideUp 0.4s;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .detected-foods {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .detected-item {
            background: white;
            padding: 10px 15px;
            border-radius: 25px;
            border: 2px solid var(--primary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .detected-item:hover, .detected-item.selected {
            background: var(--primary);
            color: white;
        }

        .workout-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .workout-level {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .workout-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .workout-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .exercise-list {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .exercise-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            font-size: 0.95rem;
        }

        .exercise-item:last-child {
            border-bottom: none;
        }

        .timer-display {
            font-size: 3rem;
            font-weight: 800;
            text-align: center;
            color: var(--primary);
            margin: 20px 0;
            font-family: monospace;
        }

        .timer-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .recipe-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 600px) {
            .recipe-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .recipe-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .recipe-card:hover {
            transform: translateY(-10px);
        }

        .recipe-image {
            height: 150px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
        }

        .recipe-content {
            padding: 20px;
        }

        .recipe-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--dark);
        }

        .recipe-meta {
            display: flex;
            gap: 15px;
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .recipe-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            padding: 5px 12px;
            background: #e6fffa;
            color: var(--primary);
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: popIn 0.3s;
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 25px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
        }

        .modal-body {
            padding: 25px;
        }

        .ingredients-list, .steps-list {
            list-style: none;
            margin: 20px 0;
        }

        .ingredients-list li, .steps-list li {
            padding: 12px;
            background: #f8f9fa;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }

        .ingredients-list li::before {
            content: '✓';
            color: var(--primary);
            font-weight: 700;
        }

        .steps-list li {
            counter-increment: step;
        }

        .steps-list li::before {
            content: counter(step);
            background: var(--primary);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .history-date {
            font-weight: 700;
            color: var(--dark);
            font-size: 0.95rem;
        }

        .history-stats {
            display: flex;
            gap: 15px;
            text-align: center;
        }

        .history-stat {
            padding: 8px 12px;
            background: white;
            border-radius: 10px;
        }

        .history-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
        }

        .history-label {
            font-size: 0.75rem;
            color: #666;
        }

        .achievement {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
            animation: slideInRight 0.5s;
            z-index: 1001;
            border-left: 5px solid var(--accent);
            max-width: 300px;
        }

        @keyframes slideInRight {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .achievement-icon {
            font-size: 2.5rem;
            margin-right: 15px;
        }

        .achievement-text {
            font-weight: 700;
            color: var(--dark);
        }

        .achievement-sub {
            font-size: 0.85rem;
            color: #666;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f0f;
            animation: confetti-fall 3s linear forwards;
            z-index: 9999;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .suggestion-chips {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 15px 0;
        }

        .suggestion-chip {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .suggestion-chip:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
                border-radius: 25px;
            }
            
            h1 {
                font-size: 1.7rem;
            }
            
            .mascot {
                font-size: 3rem;
            }
            
            .nav-tab {
                padding: 15px 10px;
                font-size: 0.75rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .stat-value {
                font-size: 1.8rem;
